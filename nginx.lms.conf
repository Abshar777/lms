# Delta LMS API — nginx reverse proxy + load balancer
# Deploy to /etc/nginx/sites-available/ and symlink into sites-enabled/,
# then: sudo nginx -t && sudo systemctl reload nginx
#
# Balances across the PM2 Bun instances defined in ecosystem.config.js
# (ports 4000..4003). Add/remove `server` lines to match `instances`.

# Lets one connection block support BOTH WebSocket upgrades and upstream keepalive:
#   - if the client sends Upgrade → Connection: upgrade
#   - otherwise                   → Connection: "" (reused keepalive connection)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

upstream lms_backend {
    least_conn;                         # send each request to the least-busy instance
    server 127.0.0.1:4000 max_fails=3 fail_timeout=15s;
    server 127.0.0.1:4001 max_fails=3 fail_timeout=15s;
    server 127.0.0.1:4002 max_fails=3 fail_timeout=15s;
    server 127.0.0.1:4003 max_fails=3 fail_timeout=15s;
    keepalive 64;                       # pooled upstream connections (needs HTTP/1.1 + Connection "")
}

server {
    server_name api-lms.deltainstitutions.com;
    client_max_body_size 100M;

    location / {
        proxy_pass http://lms_backend;
        proxy_http_version 1.1;

        # WebSocket + keepalive
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Preserve host + REAL client IP (this is what makes per-user rate limiting work)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Failover: if an instance errors/times out, retry the next one
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/api-lms.deltainstitutions.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api-lms.deltainstitutions.com/privkey.pem;   # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;   # managed by Certbot
}
