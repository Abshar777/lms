<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium iFrame UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827, #020617);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      overflow-x: hidden;
      color: white;
    }

    .bg-blur {
      position: absolute;
      width: 350px;
      height: 350px;
      background: rgba(99, 102, 241, 0.25);
      filter: blur(120px);
      border-radius: 50%;
      top: 10%;
      left: 5%;
    }

    .bg-blur-2 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(168, 85, 247, 0.25);
      filter: blur(120px);
      border-radius: 50%;
      bottom: 5%;
      right: 5%;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 1300px;
      z-index: 2;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }

    .left-controls {
      display: flex;
      gap: 10px;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .red { background: #ff5f57; }
    .yellow { background: #ffbd2e; }
    .green { background: #28c840; }

    .url-bar {
      flex: 1;
      margin: 0 20px;
      background: rgba(255,255,255,0.08);
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .badge {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .hero {
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .hero h1 {
      font-size: 52px;
      line-height: 1.1;
      font-weight: 800;
      max-width: 800px;
      background: linear-gradient(90deg, #ffffff, #a5b4fc, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      max-width: 700px;
      line-height: 1.7;
    }

    .buttons {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 24px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      box-shadow: 0 12px 30px rgba(99, 102, 241, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .iframe-wrapper {
      padding: 0 40px 40px;
    }

    iframe {
      width: 100%;
      height: 650px;
      border: none;
      border-radius: 22px;
      overflow: hidden;
      background: white;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    @media (max-width: 768px) {
      .hero {
        padding: 28px;
      }

      .hero h1 {
        font-size: 34px;
      }

      .hero p {
        font-size: 15px;
      }

      .iframe-wrapper {
        padding: 0 20px 20px;
      }

      iframe {
        height: 500px;
      }

      .topbar {
        flex-wrap: wrap;
        gap: 15px;
      }

      .url-bar {
        width: 100%;
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blur"></div>
  <div class="bg-blur-2"></div>

  <div class="container">
    <div class="card">
      <div class="topbar">
        <div class="left-controls">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>

        <div class="url-bar">
          https://example.com
        </div>

        <div class="badge">LIVE PREVIEW</div>
      </div>

      <div class="hero">
        <h1>Beautiful Premium iFrame Layout</h1>
        <p>
          A modern glassmorphism-style iframe UI with smooth gradients, elegant spacing, premium typography, and responsive design. Replace the iframe source with your own website, dashboard, CRM, or application.
        </p>

        <div class="buttons">
          <button class="btn btn-primary">Explore More</button>
          <button class="btn btn-secondary">Documentation</button>
        </div>
      </div>

      <div class="iframe-wrapper">
        <iframe 
          src="https://meet.google.com/grc-zjhv-neo" 
          title="Website Preview"
          loading="lazy">
        </iframe>
      </div>
    </div>
  </div>
</body>
</html>
